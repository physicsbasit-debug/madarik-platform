name: Phase 10-C Live Gemini Acceptance

on:
  push:
    branches:
      - feat/madarik-science-platform-v2
    paths:
      - .github/workflows/phase10-c-live-gemini.yml
      - RUN_PHASE10_C_LIVE_GEMINI_ACCEPTANCE.py
      - backend/tests/test_phase10_c_live_gemini_acceptance.py
      - docs/PHASE_10_C_LIVE_GEMINI_ACCEPTANCE.md
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: phase10-c-live-gemini-${{ github.ref }}
  cancel-in-progress: true

jobs:
  live-gemini-acceptance:
    name: Redacted external translation acceptance
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt

      - name: Backend dependency consistency
        run: python -m pip check

      - name: Validate Phase 10-C acceptance without network
        run: |
          PYTHONPATH=backend python -m pytest -q \
            backend/tests/test_phase10_c_live_gemini_acceptance.py

      - name: Run live Gemini acceptance
        env:
          MADARIK_AI_PROVIDER: ${{ secrets.MADARIK_AI_PROVIDER }}
          MADARIK_AI_EXTERNAL_ENABLED: ${{ secrets.MADARIK_AI_EXTERNAL_ENABLED }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
          GEMINI_BASE_URL: ${{ secrets.GEMINI_BASE_URL }}
          MADARIK_AI_TIMEOUT_SECONDS: "60"
          MADARIK_AI_MAX_INPUT_CHARS: "4000"
          MADARIK_AI_MAX_OUTPUT_TOKENS: "1200"
          MADARIK_AI_TEMPERATURE: "0.1"
        run: |
          python RUN_PHASE10_C_LIVE_GEMINI_ACCEPTANCE.py \
            --json-output "$RUNNER_TEMP/phase10c-live-gemini.json"

      - name: Upload redacted acceptance evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase10c-live-gemini-${{ github.run_number }}
          path: ${{ runner.temp }}/phase10c-live-gemini.json
          if-no-files-found: error
          retention-days: 30
