name: Phase 10-A Release Gate

on:
  push:
    branches:
      - main
      - feat/madarik-science-platform-v2
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: phase10-a-release-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-gate:
    name: Release readiness and end-to-end acceptance
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Pin npm for CI stability
        run: |
          npm install --global npm@10.5.0 --no-audit --no-fund
          npm --version

      - name: Install OCR and rendering dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            tesseract-ocr \
            tesseract-ocr-eng \
            fonts-dejavu-core \
            libcairo2

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt

      - name: Repository and OpenAPI release audit
        run: |
          python RUN_PHASE10_A_RELEASE_AUDIT.py --repository-root .

      - name: Python syntax
        run: |
          python -m compileall -q backend/app backend/tests

      - name: Phase 10-A focused acceptance
        run: |
          PYTHONPATH=backend python -m pytest -q \
            backend/tests/test_phase10_a_release_readiness.py \
            backend/tests/test_phase10_a_end_to_end_acceptance.py

      - name: Backend full test suite
        run: |
          cd backend
          python -m pytest -q

      - name: Frontend clean install
        working-directory: frontend
        run: npm ci --no-audit --no-fund

      - name: Frontend lint
        working-directory: frontend
        run: npm run lint

      - name: Frontend production build
        working-directory: frontend
        run: npm run build

      - name: Final repository whitespace check
        run: git diff --check
