name: Phase 10-B Final RC Gate

on:
  push:
    branches:
      - main
      - feat/madarik-science-platform-v2
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: phase10-b-final-rc-${{ github.ref }}
  cancel-in-progress: true

jobs:
  final-rc-gate:
    name: Final release candidate consolidation
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Pin npm for CI stability
        run: |
          npm install --global npm@10.5.0 --no-audit --no-fund
          npm --version

      - name: Install OCR and rendering dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            tesseract-ocr \
            tesseract-ocr-eng \
            fonts-dejavu-core \
            libcairo2

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt

      - name: Phase 10-B final RC preflight
        run: |
          python RUN_PHASE10_B_RC_PREFLIGHT.py \
            --repository-root . \
            --json-output "$RUNNER_TEMP/phase10b-preflight.json"

      - name: Upload RC preflight report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase10b-preflight-${{ github.run_number }}
          path: ${{ runner.temp }}/phase10b-preflight.json
          if-no-files-found: warn
          retention-days: 14

      - name: Python syntax
        run: python -m compileall -q backend/app backend/tests

      - name: Backend dependency consistency
        run: python -m pip check

      - name: Phase 10-B focused acceptance
        run: |
          PYTHONPATH=backend python -m pytest -q \
            backend/tests/test_phase10_a_release_readiness.py \
            backend/tests/test_phase10_a_end_to_end_acceptance.py \
            backend/tests/test_phase10_b_release_candidate.py

      - name: Backend full test suite
        run: |
          cd backend
          python -m pytest -q

      - name: Frontend clean install
        working-directory: frontend
        run: npm ci --no-audit --no-fund

      - name: Frontend lint
        working-directory: frontend
        run: npm run lint

      - name: Frontend production build
        working-directory: frontend
        run: npm run build

      - name: Final repository whitespace check
        run: git diff --check
