name: Deploy Phase 11-A Platform Preview

on:
  push:
    branches:
      - feat/madarik-science-platform-v2
    paths:
      - .github/workflows/deploy-phase11a-preview.yml
      - frontend/**
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages-phase11a-preview
  cancel-in-progress: true

jobs:
  build:
    name: Build new platform UX
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Configure Backend endpoint
        env:
          MADARIK_API_BASE_URL: ${{ vars.MADARIK_API_BASE_URL }}
        run: |
          if [ -n "$MADARIK_API_BASE_URL" ]; then
            echo "VITE_API_BASE_URL=$MADARIK_API_BASE_URL" >> "$GITHUB_ENV"
          fi

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --no-audit --no-fund

      - name: Frontend lint
        working-directory: frontend
        run: npm run lint

      - name: Build platform preview
        working-directory: frontend
        run: npm run build -- --base=/${{ github.event.repository.name }}/

      - name: Disable Jekyll processing
        run: touch frontend/dist/.nojekyll

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: frontend/dist

  deploy:
    name: Deploy new platform UX
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
